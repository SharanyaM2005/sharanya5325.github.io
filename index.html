<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sharanya M</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  height:100vh;
  font-family:'Poppins',sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(-45deg,#6366f1,#06b6d4,#9333ea,#ec4899);
  background-size:400% 400%;
  animation:gradient 10s ease infinite;
}

@keyframes gradient{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.container{
  display:flex;
  align-items:center;
  gap:40px;
  padding:40px;
  border-radius:20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  box-shadow:0 10px 40px rgba(0,0,0,0.4);
  color:white;
  animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px)}
  to{opacity:1; transform:translateY(0)}
}

/* profile image */
.profile-img{
  width:180px;
  height:180px;
  border-radius:50%;
  overflow:hidden;
  border:4px solid #38bdf8;
  box-shadow:0 0 30px #38bdf8;
  flex-shrink:0;
}

.profile-img img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.text h1{
  margin:0;
  font-size:42px;
}

.text p{
  margin:8px 0;
  opacity:.9;
  font-size:18px;
}

button{
  margin-top:18px;
  padding:12px 28px;
  border:none;
  border-radius:30px;
  background:white;
  color:#6d28d9;
  font-size:16px;
  cursor:pointer;
  transition:.3s;
}

button:hover{
  transform:scale(1.1);
}

/* mobile */
@media(max-width:700px){
  .container{
    flex-direction:column;
    text-align:center;
  }
}

</style>
</head>

<body>

<div class="container">

  <div class="profile-img">
    <img src="profile.jpg" alt="Sharanya">
  </div>

  <div class="text">
    <h1>Sharanya M</h1>
    <p>Frontend Developer & UI/UX Enthusiast</p>
    <p>Designing modern & user-friendly experiences</p>

    <button onclick="location.href='portfolio.html'">
      View Portfolio →
    </button>
  </div>

</div>

</body>
</html>
